<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - Henry Donahue</title>
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
    <style>
        * { margin: 0; padding: 0; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        .bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            opacity: 0.3;
        }
        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #000;
        }
        .content h1 {
            font-size: 36px;
            font-weight: normal;
            margin-bottom: 10px;
        }
        .content p {
            font-size: 20px;
        }
        .content a {
            color: #0000EE;
            font-size: 18px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <img id="bg" class="bg" src="" alt="">
    <div class="content">
        <h1>Under Construction</h1>
        <a href="/">Back</a>
    </div>

    <script>
        const frames = [];
        for (let i = 2; i <= 21; i++) {
            const ext = String(i).padStart(4, '0');
            const int_ = String(i - 1).padStart(4, '0');
            const out = String(i + 64).padStart(4, '0');
            frames.push('images/gif/heatmap_ext' + ext + '_gap01_int' + int_ + '_out' + out + '.png');
        }

        const img = document.getElementById('bg');
        let index = 0;
        let direction = 1;
        img.src = frames[0];

        setInterval(() => {
            index += direction;
            if (index >= frames.length - 1) direction = -1;
            if (index <= 0) direction = 1;
            img.src = frames[index];
        }, 800);
    </script>
</body>
</html>
